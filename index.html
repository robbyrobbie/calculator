<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="script.css">
</head>

<body>
  <h1>Calculator</h1>
  <div>
    <div id="userinput">
      <div id="usernum1">
        <label for="num1">No. 1</label>
        <input type="number" id="num1">
      </div>
      <div id="usernum2">
        <label for="num2">No. 2</label>
        <input type="number" id="num2">
      </div>
    </div>
    <br>
    <div id="select">
      <button type="button" data-action="addition">Add</button>
      <button type="button" data-action="subtraction">Subtract</button>
      <button type="button" data-action="multiplication">Multiply</button>
      <button type="button" data-action="division">Divide</button>
    </div>
    <br>
    <div id="fnresult">
      <label for="result">Result</label>
      <input type="number" id="result" readonly>
    </div>
  </div>
  
  <script src="script.js" defer></script>
</body>

</html>
